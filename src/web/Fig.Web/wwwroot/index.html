<!DOCTYPE html>
<html lang="en">

<head>
    <!--<link id="favicon" rel="shortcut icon" type="image/ico" href="~/Images/fig_icon_only.png">-->
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Fig</title>
    <base href="/"/>
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet"/>
    <link href="css/app.css" rel="stylesheet"/>
    <link href="Fig.Web.styles.css" rel="stylesheet"/>
    <link href="_content/Radzen.Blazor/css/standard-dark-base.css" rel="stylesheet">

    <style>
        body {
            background: #1a1a1a;
        }
        .glow-highlight {
            box-shadow: 0 0 0 4px yellow, 0 0 16px 8px yellow;
            opacity: 1;
            transition: box-shadow 0.3s, opacity 0.7s;
            z-index: 100;
        }
        .glow-highlight.fade-out {
            opacity: 0;
            box-shadow: 0 0 0 0 yellow, 0 0 0 0 yellow;
        }
    </style>

    <script type="text/javascript">
        function saveAsFile(filename, bytesBase64) {
            var link = document.createElement('a');
            link.download = filename;
            link.href = "data:application/octet-stream;base64," + bytesBase64;
            document.body.appendChild(link); // Needed for Firefox
            link.click();
            document.body.removeChild(link);
        }

        function scrollIntoView(elementId) {
            var elem = document.getElementById(elementId);
            if (elem) {
                // Native center
                elem.scrollIntoView({ block: "center", inline: "nearest", behavior: "smooth" });

                setTimeout(function() {
                    // Check if element is centered in viewport
                    var elemRect = elem.getBoundingClientRect();
                    var viewportHeight = window.innerHeight || document.documentElement.clientHeight;
                    var elemCentered = Math.abs((elemRect.top + elemRect.bottom) / 2 - viewportHeight / 2) < 5;

                    if (!elemCentered) {
                        // Fallback for scrollable containers
                        var parent = elem.parentElement;
                        while (parent) {
                            var overflowY = window.getComputedStyle(parent).overflowY;
                            if (overflowY === "auto" || overflowY === "scroll") {
                                var parentRect = parent.getBoundingClientRect();
                                var parentScrollTop = parent.scrollTop;
                                var offset = elemRect.top - parentRect.top - (parentRect.height / 2) + (elemRect.height / 2);
                                parent.scrollTo({ top: parentScrollTop + offset, behavior: "smooth" });
                                break;
                            }
                            parent = parent.parentElement;
                        }
                    }
                }, 350); // Wait for native scroll to finish

                window.location.hash = elementId;
            }
        }

        window.highlightSetting = function(elementId) {
            var el = document.getElementById(elementId);
            if (!el) return;
            el.classList.add('glow-highlight');
            setTimeout(function() {
                el.classList.add('fade-out');
            }, 2500);
            setTimeout(function() {
                el.classList.remove('glow-highlight', 'fade-out');
            }, 3000);
};
    </script>
</head>

<body>
<div id="app">
    <div>
        <img asp-append-version="true" class="centered-image" height="410" src="images\fig_logo_name_below_white_500x820.png"
             width="250" />

</div>
