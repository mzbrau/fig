name: mutation testing

on:
  push:
    branches: [ main ]
    paths-ignore:
    - 'README.md'
    - 'doc/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
    - 'README.md'
    - 'doc/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  STRYKER_RUNNING: 1

jobs:
  mutation-test:
    name: stryker-${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fig.Client
            project: Fig.Client.csproj
          - name: Fig.Api
            project: Fig.Api.csproj
          - name: Fig.Mcp
            project: Fig.Mcp.csproj
          - name: Fig.Common.NetStandard
            project: Fig.Common.NetStandard.csproj
          - name: Fig.Client.Contracts
            project: Fig.Client.Contracts.csproj
          - name: Fig.Client.SecretProvider.Dpapi
            project: Fig.Client.SecretProvider.Dpapi.csproj

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Stryker tool
      run: dotnet tool restore

    - name: Run Stryker
      run: dotnet stryker --config-file src/tests/Fig.Unit.Test/stryker-config.json --test-project src/tests/Fig.Unit.Test/Fig.Unit.Test.csproj --project ${{ matrix.project }} --since:main --output src/tests/Fig.Unit.Test/StrykerOutput/${{ matrix.name }}

    - name: Upload Stryker reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stryker-${{ matrix.name }}
        path: src/tests/Fig.Unit.Test/StrykerOutput/${{ matrix.name }}/**/*
        if-no-files-found: ignore
