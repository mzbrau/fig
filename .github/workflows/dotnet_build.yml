name: build and test

on:
  push:
    branches: [ main ]
    paths-ignore:
    - 'README.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
    - 'README.md'

env:
  DOTNET_VERSION: '10.0.x' # The .NET SDK version to use
  # Disable unnecessary features that can slow down tests
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1


jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Restore
      run: dotnet restore ./src

    - name: Build
      shell: bash
      run: |
        set -o pipefail
        dotnet build --configuration Release --no-restore ./src /p:ErrorLog=build.sarif 2>&1 | tee build.log

    - name: Upload build outputs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-outputs
        path: |
          src/**/bin/**
          src/**/obj/**
        if-no-files-found: ignore

    - name: Upload build diagnostics
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-diagnostics
        path: |
          build.log
          src/**/build.sarif
        if-no-files-found: warn

  unit-tests:
    name: unit-tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Download build outputs
      uses: actions/download-artifact@v4
      with:
        name: build-outputs
        path: src

    - name: Run Unit Tests
      working-directory: src/tests/Fig.Unit.Test
      run: dotnet test --configuration Release --no-build --no-restore --verbosity detailed --collect:"XPlat Code Coverage" --logger "trx;LogFileName=unit-test-results.trx" --results-directory ./TestResults --settings ../../test.runsettings --blame-hang-timeout 20m Fig.Unit.Test.csproj
      timeout-minutes: 25

    - name: Upload Unit Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unit-test-results
        path: |
          src/tests/Fig.Unit.Test/TestResults/*.trx
          src/tests/Fig.Unit.Test/TestResults/**/coverage.cobertura.xml
        if-no-files-found: error

  integration-tests:
    name: integration-tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Download build outputs
      uses: actions/download-artifact@v4
      with:
        name: build-outputs
        path: src

    - name: Run Integration Tests
      working-directory: src/tests/Fig.Integration.Test
      run: dotnet test --configuration Release --no-build --no-restore --verbosity detailed --collect:"XPlat Code Coverage" --logger "trx;LogFileName=integration-test-results.trx" --results-directory ./TestResults --settings ../../test.runsettings --blame-hang-timeout 30m Fig.Integration.Test.csproj
      timeout-minutes: 35

    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: |
          src/tests/Fig.Integration.Test/TestResults/*.trx
          src/tests/Fig.Integration.Test/TestResults/**/coverage.cobertura.xml
        if-no-files-found: error

  test-report:
    name: test-report
    runs-on: ubuntu-latest
    needs: [build, unit-tests, integration-tests]
    if: always()
    permissions:
      contents: read
      actions: read
      pull-requests: write
      checks: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Unit Test Results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: unit-test-results
        path: unit-test-results/

    - name: Download Integration Test Results
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: integration-test-results
        path: integration-test-results/

    - name: Download Build Diagnostics
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: build-diagnostics
        path: build-diagnostics/

    - name: Publish test report
      uses: mzbrau/actions-insights@v1
      if: always()
      continue-on-error: true
      with:
        test-results: '**/*.trx'
        coverage-enabled: true
        coverage-files: '**/coverage.cobertura.xml'
        diagnostics-enabled: true
        diagnostics-files: 'build.log,build-diagnostics/build.log,**/build.sarif'
        comment-mode: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && 'update' || 'off' }}
        history-enabled: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        history-repository: 'mzbrau/mzbrau-actions-insights'
        history-token: ${{ secrets.ACTIONS_INSIGHTS_HISTORY_TOKEN }}
