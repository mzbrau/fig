name: "Deploy to Docker"

on:
  workflow_run:
    workflows: ["Create Release", "Create Pre-Release"]
    types:
      - completed

jobs:
  build:
    name: Building image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: "Get Version"
        id: version
        run: |
          version="${{ github.event.workflow_run.head_branch }}"
          version=${version#v}
          echo "version-without-v=$version" >> $GITHUB_OUTPUT

      - name: "Set Docker tags"
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          if [[ "${{ github.event.workflow_run.head_branch }}" == *"-alpha"* ]]; then
            echo "web=${USERNAME}/fig-web:${VERSION}" >> $GITHUB_OUTPUT
            echo "api=${USERNAME}/fig-api:${VERSION}" >> $GITHUB_OUTPUT
            echo "sentinel=${USERNAME}/fig-sentinel-integration:${VERSION}" >> $GITHUB_OUTPUT
            echo "mcp=${USERNAME}/fig-mcp:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "web=${USERNAME}/fig-web:latest , ${USERNAME}/fig-web:${VERSION}" >> $GITHUB_OUTPUT
            echo "api=${USERNAME}/fig-api:latest , ${USERNAME}/fig-api:${VERSION}" >> $GITHUB_OUTPUT
            echo "sentinel=${USERNAME}/fig-sentinel-integration:latest , ${USERNAME}/fig-sentinel-integration:${VERSION}" >> $GITHUB_OUTPUT
            echo "mcp=${USERNAME}/fig-mcp:latest , ${USERNAME}/fig-mcp:${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: DockerHub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/web/Fig.Web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web }}
          build-args: |
            VERSION=${{ steps.version.outputs.version-without-v }}
          
      - name: Build and push Api
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/api/Fig.Api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api }}
          build-args: |
            VERSION=${{ steps.version.outputs.version-without-v }}
          
      - name: Build and push Microsoft Sentinel Integration
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/integrations/Fig.Integration.MicrosoftSentinel/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.sentinel }}
          build-args: |
            VERSION=${{ steps.version.outputs.version-without-v }}

      - name: Build and push MCP Server
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/mcp/Fig.Mcp/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.mcp }}
          build-args: |
            VERSION=${{ steps.version.outputs.version-without-v }}
